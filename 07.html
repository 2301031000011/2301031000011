<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Detail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #faf3fc;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .back {
            font-size: 18px;
            text-decoration: none;
            color: black;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .recipe-header {
            display: flex;
            gap: 20px;
        }

        .recipe-header img {
            width: 250px;
            height: 160px;
            border-radius: 10px;
            object-fit: cover;
        }

        .recipe-info h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .recipe-info p {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }

        .save-btn {
            background: #6b4a7c;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .suggestions {
            margin-top: 30px;
        }

        .suggestions h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .suggested-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .suggested-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f7f1fa;
            padding: 10px;
            border-radius: 8px;
        }

        .suggested-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .suggested-item .details {
            flex: 1;
        }

        .suggested-item h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .suggested-item p {
            font-size: 12px;
            color: #666;
        }

        .time {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
        }

        .time::before {
            content: "⏳";
        }

        .arrow {
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="#" class="back">← Jeera Rice</a>

        <div class="recipe-header">
            <img src="https://source.unsplash.com/250x160/?jeera-rice" alt="Jeera Rice">
            <div class="recipe-info">
                <h1>Kapur’s Fav Jeera Rice</h1>
                <p>Published date</p>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
                <button class="save-btn">Save Item</button>
            </div>
        </div>

        <div class="suggestions">
            <h2>You May Like →</h2>
            <div class="suggested-list">
                <div class="suggested-item">
                    <img src="https://source.unsplash.com/60x60/?sweet-rice" alt="Sweet Rice">
                    <div class="details">
                        <h3>Sweet Rice</h3>
                        <p>Description duis aute irure dolor in reprehenderit.</p>
                        <div class="time">Today · 23 min</div>
                    </div>
                    <div class="arrow">▶</div>
