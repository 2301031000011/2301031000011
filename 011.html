<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        img {
            width: 80%;
            max-width: 300px;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
        }
        .contact {
            margin-top: 10px;
            color: #000;
        }
        .contact a {
            color: #007bff;
            text-decoration: none;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>We’re under maintenance!</h1>
        <img src="maintenance.png" alt="Under Maintenance">
        <p>Our site is currently undergoing scheduled maintenance. We apologize for any inconvenience.</p>
        <p class="contact">Contact us at <a href="mailto:support@company.com">support@company.com</a></p>
        <a href="/" class="button">Home</a>
    </div>
</body>
</html>
