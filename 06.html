<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: #fff;
            color: #000;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .text {
            max-width: 400px;
        }

        .text h1 {
            font-size: 80px;
            font-weight: bold;
        }

        .text p {
            font-size: 18px;
            color: #555;
        }

        .illustration {
            width: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="text">
            <h1>404</h1>
            <h2>Page not Found!</h2>
            <p>Oops! It looks like you’ve taken a wrong turn. Don’t worry, we’ll help you find your way back.</p>
        </div>
        <img class="illustration" src="https://cdn-icons-png.flaticon.com/512/3405/3405619.png" alt="404 Illustration">
    </div>

</body>
</html>
