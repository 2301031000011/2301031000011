<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings & Uploads</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }
        .sidebar {
            width: 250px;
            background: rgba(165, 108, 92, 0.8);
            padding: 20px;
            height: 100vh;
            color: white;
        }
        .sidebar h2 {
            font-size: 24px;
        }
        .sidebar input {
            width: 90%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: none;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar ul li {
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .content {
            flex: 1;
            padding: 20px;
            background: #f7f7f7;
            text-align: center;
        }
        .uploads-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        .uploads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .upload-item {
            background: #ddd;
            padding: 30px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>⚙️ Settings</h2>
        <input type="text" placeholder="Search settings...">
        <ul>
            <li>📩 Personalized Mails</li>
            <li>⭐ Saved Items</li>
            <li>📤 Upload Your Recipe</li>
            <li>🎨 Personalized</li>
            <li>🔗 Share App</li>
            <li>😊 Rate Us</li>
            <li>🌍 Change Language</li>
        </ul>
    </div>
    <div class="content">
        <h1>Your Uploads</h1>
        <div class="uploads-container">
            <h2>Your uploads you can see here...</h2>
            <div class="uploads-grid">
                <div class="upload-item">🔺 ⬜ ⚫</div>
                <div class="upload-item">🔺 ⬜ ⚫</div>
                <div class="upload-item">🔺 ⬜ ⚫</div>
                <div class="upload-item">🔺 ⬜ ⚫</div>
                <div class="upload-item">🔺 ⬜ ⚫</div>
            </div>
        </div>
    </div>
</body>
</html>
