<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f3e5d8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }
        .header h1 {
            color: brown;
            font-size: 28px;
        }
        .search {
            display: flex;
            align-items: center;
            background: lavender;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .menu {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        .menu button {
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
        }
        .content {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }
        .suggestions, .new-recipes {
            flex: 1;
            padding: 10px;
        }
        .recipe-card {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .recipe-card img {
            width: 100%;
            border-radius: 5px;
        }
        .buttons {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        .buttons button {
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .buttons .dislike {
            background: lightgray;
        }
        .buttons .add {
            background: purple;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome Back</h1>
        <div class="search">
            <input type="text" placeholder="Search...">
            <button>+</button>
        </div>
    </div>
    
    <div class="menu">
        <button>Make Weekly Menu</button>
        <button>Make Diet Plan</button>
        <button>Generate Recipe using Items</button>
        <button>International Food</button>
    </div>
    
    <div class="content">
        <div class="suggestions">
            <h2>Suggestions...</h2>
            <div class="recipe-card">
                <h3>Jeera Rice</h3>
                <img src="https://source.unsplash.com/300x200/?rice" alt="Jeera Rice">
                <p>Subtitle</p>
                <div class="buttons">
                    <button class="dislike">Dislike</button>
                    <button class="add">Add to List</button>
                </div>
            </div>
            <div class="recipe-card">
                <h3>Dal Fry</h3>
                <img src="https://source.unsplash.com/300x200/?dal" alt="Dal Fry">
                <p>Subtitle</p>
                <div class="buttons">
                    <button class="dislike">Dislike</button>
                    <button class="add">Add to List</button>
                </div>
            </div>
        </div>
        <div class="new-recipes">
            <h2>New Recipes...</h2>
            <ul>
                <li>Pasta - click here to view details</li>
                <li>Pizza - click here to view details</li>
                <li>Burger - click here to view details</li>
                <li>Noodles - click here to view details</li>
                <li>Kulfi - click here to view details</li>
            </ul>
        </div>
    </div>
</body>
</html>
